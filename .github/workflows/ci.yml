name: SmartERP CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: smart_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
    - name: Install dependencies
      run: cd backend && uv sync
      
    - name: Run backend tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/smart_erp_test
        SECRET_KEY: test_secret_key
      run: |
        cd backend
        uv run pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-python@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: cd frontend && npm install
      
    - name: Build frontend
      run: cd frontend && npm run build
